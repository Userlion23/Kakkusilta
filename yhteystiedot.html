            </div>
          </div>

          <!-- HAMBURGER -->
          <button class="hamburger" id="hamburger" aria-label="Avaa valikko" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>

        </div>
      </nav>
    </header>

    <main>
      <section class="lomake">
        <form action="https://api.web3forms.com/submit" method="POST">

          <h3>Tilauslomake</h3>
          <p>Vastaamme 24 tunnin sisällä ja vahvistamme tilauksen.</p>

          <input type="hidden" name="access_key" value="18f31ed1-7840-479d-8dbb-cd236b407216">

          <div class="rivi1">
            <div class="label">
              <label for="nimi">Nimi</label>
              <input id="nimi" type="text" name="name" placeholder="Etunimi Sukunimi" required>
            </div>
            <div class="label">
              <label for="puhelin">Puhelinnumero</label>
              <input id="puhelin" type="tel" name="puhelinnumero" placeholder="040 123 4567" required>
            </div>
          </div>

          <div class="rivi2">
            <div class="label">
              <label for="email">Sähköposti</label>
              <input id="email" type="email" name="email" placeholder="esimerkki@gmail.com" required>
            </div>
            <div class="label">
              <label for="tuote">Toivottu tuote</label>
              <input id="tuote" name="toivottu_tuote" placeholder="Syntymäpäiväkakku">
            </div>
          </div>

          <div class="rivi3">
            <div class="label">
              <label for="noutopv">Toivottu noutopäivä</label>
              <input id="noutopv" type="date" name="noutopäivä" required>
            </div>
          </div>   

          <div class="rivi3">
            <div class="label" style="margin-top:16px">
              <label for="lisatiedot">Lisätiedot ja toiveet</label>
              <textarea id="lisatiedot" name="Lisätiedot" placeholder="Allergeenit, väritoiveet, teksti kakkuun..."></textarea>
              <input type="file" name="attachment" />
            </div>
          </div>

          <div class="rivi3">
            <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
            <button type="submit">Lähetä tilaus →</button>
          </div>

        </form>
      </section>
    </main>

    <script>
      const hamburger = document.getElementById('hamburger');
      const navMenu   = document.getElementById('nav-menu');

      hamburger.addEventListener('click', () => {
        const open = hamburger.classList.toggle('active');
        navMenu.classList.toggle('active');
        hamburger.setAttribute('aria-expanded', open);
      });

      navMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('active');
          navMenu.classList.remove('active');
          hamburger.setAttribute('aria-expanded', 'false');
        });
      });

      document.addEventListener('click', e => {
        if (!hamburger.contains(e.target) && !navMenu.contains(e.target)) {
          hamburger.classList.remove('active');
          navMenu.classList.remove('active');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });
    </script>

  </body>
</html>
